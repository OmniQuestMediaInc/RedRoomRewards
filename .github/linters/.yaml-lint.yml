---
# yamllint config — RedRoomRewards
# Tuned so workflow files with long inline expressions / shell commands and
# governance YAML don't trigger chronic lint failures on every PR.

extends: default

ignore: |
  super-linter-output/
  node_modules/
  dist/
  build/
  out/
  coverage/
  .venv/
  vendor/
  archive/
  LEGACY_CONFIGS/
  REFERENCE_LIBRARY/
  PROGRAM_CONTROL/
  docs/history/

rules:
  # GitHub Actions workflows use `on:` which yamllint sees as truthy.
  truthy: disable

  # Not every YAML file starts with `---`; don't fail when it's missing.
  document-start: disable

  # Long inline GH Actions expressions and shell one-liners blow past any
  # reasonable column limit; disable rather than sprinkle disable-comments
  # throughout every workflow file.
  line-length: disable

  # Require two spaces between content and trailing comments (readable, and
  # matches Prettier/editorconfig conventions).
  comments:
    min-spaces-from-content: 2
    require-starting-space: true

  # Allow both [a, b] and [ a, b ] bracket styles while we normalize.
  brackets:
    max-spaces-inside: 1
    max-spaces-inside-empty: 1

  # Same tolerance for flow-style maps.
  braces:
    max-spaces-inside: 1
    max-spaces-inside-empty: 1

  # Workflow files commonly use a leading blank line after `---`.
  empty-lines:
    max: 2
    max-start: 1
    max-end: 1

  indentation:
    spaces: 2
    indent-sequences: consistent
    check-multi-line-strings: false
