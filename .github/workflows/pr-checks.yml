---
name: PR Status Check and Merge Readiness

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-merge-conflicts:
    name: Check for Merge Conflicts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch main branch
        run: |
          git fetch origin main:refs/remotes/origin/main --unshallow || git fetch origin main:refs/remotes/origin/main

      - name: Check for merge conflicts
        id: conflict_check
        run: |
          set +e
          git merge-base ${{ github.event.pull_request.head.sha }} origin/main
          BASE=$(git merge-base ${{ github.event.pull_request.head.sha }} origin/main)

          # Attempt a test merge
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Try to merge main into current branch (test only, won't push)
          git merge --no-commit --no-ff origin/main > /dev/null 2>&1
          MERGE_STATUS=$?

          if [ $MERGE_STATUS -ne 0 ]; then
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            echo "Merge conflicts detected"

            # Get list of conflicting files
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            echo "conflicts_list=$CONFLICTS" >> "$GITHUB_OUTPUT"

            # Abort the test merge
            git merge --abort
          else
            echo "conflict=false" >> "$GITHUB_OUTPUT"
            echo "No merge conflicts detected"
            git merge --abort 2>/dev/null || true
          fi

      - name: Comment on PR if conflicts detected
        if: steps.conflict_check.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONFLICTS="${{ steps.conflict_check.outputs.conflicts_list }}"
          cat > /tmp/conflict_comment.md <<'EOF'
          ## ⚠️ Merge Conflicts Detected

          This PR has conflicts with the `main` branch that must be resolved before merging.

          **Conflicting files:**
          ```
          CONFLICTS_PLACEHOLDER
          ```

          **To resolve:**

          1. Sync your branch with main:
             ```bash
             git fetch origin
             git merge origin/main
             ```

          2. Resolve conflicts in each file
          3. Commit and push:
             ```bash
             git add .
             git commit -m "Resolve merge conflicts with main"
             git push
             ```

          **See:** [`.github/PR_CONFLICT_RESOLUTION.md`](.github/PR_CONFLICT_RESOLUTION.md) for detailed guidance.

          **For FIZ-scoped conflicts:** Request human review before resolving.
          EOF
          sed -i "s/CONFLICTS_PLACEHOLDER/$CONFLICTS/" /tmp/conflict_comment.md
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/conflict_comment.md || echo "Could not post comment"

      - name: Add conflict label
        if: steps.conflict_check.outputs.conflict == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-label "merge-conflict" || echo "Could not add label"

  check-build:
    name: Verify Build Passes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

      - name: Run build
        run: npm run build

      - name: Comment on PR if build fails
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/build_fail_comment.md <<'EOF'
          ## ❌ Build Failed

          The build for this PR is failing. Please fix the errors before merging.

          **Check the Actions tab for detailed error messages.**

          Common issues:
          - TypeScript compilation errors
          - Missing dependencies
          - Import/export issues

          Run locally:
          ```bash
          npm run build
          ```
          EOF
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/build_fail_comment.md || echo "Could not post comment"

  check-tests:
    name: Verify Tests Pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --coverage --maxWorkers=2

      - name: Comment on PR if tests fail
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/test_fail_comment.md <<'EOF'
          ## ❌ Tests Failed

          Some tests are failing in this PR. Please fix the failing tests before merging.

          **Check the Actions tab for detailed test results.**

          Run locally:
          ```bash
          npm test
          ```
          EOF
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/test_fail_comment.md || echo "Could not post comment"

  merge-readiness-summary:
    name: PR Merge Readiness Summary
    runs-on: ubuntu-latest
    needs: [check-merge-conflicts, check-build, check-tests]
    if: always()

    steps:
      - name: Check all statuses
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONFLICT_STATUS="${{ needs.check-merge-conflicts.result }}"
          BUILD_STATUS="${{ needs.check-build.result }}"
          TEST_STATUS="${{ needs.check-tests.result }}"

          if [ "$CONFLICT_STATUS" = "success" ] && [ "$BUILD_STATUS" = "success" ] && [ "$TEST_STATUS" = "success" ]; then
            echo "✅ All checks passed - PR is ready for review and merge"
            cat > /tmp/ready_comment.md <<'EOF'
            ## ✅ Merge Readiness: READY

            All automated checks have passed:
            - ✅ No merge conflicts
            - ✅ Build passes
            - ✅ Tests pass

            This PR is ready for review. Once approved, auto-merge will handle the merge automatically.
            EOF
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/ready_comment.md || echo "Could not post comment"
          else
            echo "❌ Some checks failed - PR needs attention"

            FAILED=""
            [ "$CONFLICT_STATUS" != "success" ] && FAILED="${FAILED}\n- ❌ Merge conflicts detected"
            [ "$BUILD_STATUS" != "success" ] && FAILED="${FAILED}\n- ❌ Build failed"
            [ "$TEST_STATUS" != "success" ] && FAILED="${FAILED}\n- ❌ Tests failed"

            cat > /tmp/blocked_comment.md <<EOF
            ## ❌ Merge Readiness: BLOCKED

            Some checks need attention before this PR can be merged:
            $(echo -e "$FAILED")

            Please address the failing checks and push updates.
            EOF
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/blocked_comment.md || echo "Could not post comment"
          fi
