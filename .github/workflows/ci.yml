name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    name: File & Schema Checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Charter integrity check
        run: node scripts/ci/charter-integrity-check.js

      - name: No hardcoded balance values (B-008)
        run: |
          node scripts/ci/no-hardcoded-balance.js --self-test
          node scripts/ci/no-hardcoded-balance.js

      - name: Required file structure
        run: |
          required_files=(
            "docs/contracts/xxx-events.schema.json"
            "api/openapi.yaml"
          )
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Schema validation
        run: node scripts/validate-schema.js
