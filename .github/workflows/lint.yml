---
name: Lint (Super-Linter)

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  statuses: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history required)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Super-Linter (targeted validators)
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Only validators we actually want enforced. Everything else is off.
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true

          # Lint only the diff on PRs, not the whole repo.
          VALIDATE_ALL_CODEBASE: false
          IGNORE_GITIGNORED_FILES: true

          # INCLUDE: workflows, .github, docs, and root-level md/yml/yaml/json.
          # Require a lintable extension on every file so extensionless files
          # (e.g. `.github/KICKOFF`, `.github/AGENT INSTRUCTIONS`) are skipped.
          FILTER_REGEX_INCLUDE: ^(\.github/[^/]+\.(md|ya?ml|json)$|\.github/(workflows|linters)/.+\.(md|ya?ml|json)$|docs/.+\.(md|ya?ml|json)$|[^/]+\.(md|ya?ml|json)$)

          # EXCLUDE: governance archives, legacy configs, reference libraries,
          # historical docs, vendored trees, and any path containing a space
          # (Super-Linter's path handling is fragile with spaces in filenames).
          FILTER_REGEX_EXCLUDE: (^|/)(archive|LEGACY_CONFIGS|REFERENCE_LIBRARY|PROGRAM_CONTROL|node_modules|dist|build|out|coverage|\.next|super-linter-output)/|(^|/)docs/history/|.* .*

          # Point validators at the repo's pinned configs explicitly.
          LINTER_RULES_PATH: .github/linters
          YAML_CONFIG_FILE: .yaml-lint.yml
          MARKDOWN_CONFIG_FILE: .markdownlint.yml

          # tsconfig.json is JSONC (comments allowed). Super-Linter's JSON
          # validator is strict and would fail on every PR that touches it.
          JSON_FILTER_REGEX_EXCLUDE: (^|/)tsconfig(\.[^/]+)?\.json$

          # Regex filters apply to repo-relative paths.
          STRIP_DEFAULT_WORKSPACE_FOR_REGEX: true

          # Actionable diagnostics if something does fail.
          LOG_LEVEL: VERBOSE
